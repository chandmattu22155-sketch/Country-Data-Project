<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-[#fdf0d5]">

    <div id="loader" class="hidden fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>
    </div>

    <header class="sticky top-0 z-50 flex flex-col md:flex-row justify-between items-center p-4 bg-[#003049] shadow-md border-b border-gray-300 gap-3">
        <div class="flex items-center justify-between w-full md:w-auto">
            <div class="flex items-center gap-2">
                <a href="index.html" class="flex items-center gap-2 text-white text-xl hover:text-sky-300 transition-colors font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span>Back</span>
                </a>
                <h2 class="text-xl md:text-2xl font-bold ml-2 text-white">Terminal</h2>
            </div>
            
            <div class="md:hidden text-[10px] font-bold text-white uppercase bg-white/10 px-2 py-1 rounded">
                Showing <span id="showing-count-mobile">0</span>
            </div>
        </div>

        <div class="relative w-full md:w-1/2">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-700"></i>
            <input type="text" id="search-input" placeholder="Search nations, codes, or capitals..."
                class="w-full md:w-96 bg-gray-100 border border-gray-300 rounded-3xl p-1.5 pl-10 text-md focus:outline-none focus:ring-2 focus:ring-yellow-500 transition">
        </div>

        <div class="hidden md:flex items-center gap-4 text-xs font-bold text-white">
            <span class="uppercase">Showing <span id="showing-count" class="ml-1">250</span></span>
            <div class="flex border rounded overflow-hidden">
                <button id="grid-view" class="bg-black text-white p-2 transition"><i class="fas fa-th-large"></i></button>
                <button id="list-view" class="bg-white text-black p-2 transition"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="hidden md:grid grid-cols-12 gap-4 px-6 mb-4 text-lg font-bold text-black uppercase tracking-widest">
            <div class="col-span-1">Flag</div>
            <div class="col-span-3">Nation / Capital</div>
            <div class="col-span-1">Code</div>
            <div class="col-span-3">Population</div>
            <div class="col-span-4">Area</div>
        </div>

        <div id="card-grid" class="flex flex-col gap-4 md:gap-6"></div>
    </main>

    <script src="detail.js"></script>
</body>
</html>
