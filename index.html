<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country API Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 768px) {
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #sidebar.show-mobile { transform: translateX(0); }
        }
    </style>
</head>

<body class="bg-gray-100 overflow-x-hidden">

    <div class="flex flex-col md:flex-row">
        <aside id="sidebar" class="fixed md:sticky top-0 left-0 w-72 h-screen bg-white border-r border-gray-200 shadow-xl md:shadow-sm z-[60] hidden-mobile md:transform-none">
            <div class="p-5 overflow-y-auto h-full">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-lg font-bold text-gray-800 tracking-wide">FILTERS</span>
                    <div class="flex gap-2">
                        <button id="clear-all" class="text-xs font-semibold text-sky-600">CLEAR ALL</button>
                        <button id="close-sidebar" class="md:hidden text-gray-500 text-xl"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <hr class="mb-5">

                <div class="mb-4 border-b border-gray-200 pb-4">
                    <button id="region-toggle" class="w-full flex justify-between items-center hover:text-sky-500 text-md font-semibold text-gray-700 py-2">
                        <span>Region</span>
                        <i id="region-icon" class="fas fa-chevron-up text-xs transition-transform duration-200"></i>
                    </button>

                    <ul id="region-list" class="space-y-3 mt-3 text-sm text-gray-700">
                        <li data-region="africa" class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" class="accent-sky-600 region-checkbox w-4 h-4">
                            <span class="font-medium">Africa</span>
                            <span class="ml-auto text-sm font-semibold text-gray-400 region-count">0</span>
                        </li>
                        <li data-region="americas" class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" class="accent-sky-600 region-checkbox w-4 h-4">
                            <span class="font-medium">Americas</span>
                            <span class="ml-auto text-sm font-semibold text-gray-400 region-count">0</span>
                        </li>
                        <li data-region="asia" class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" class="accent-sky-600 region-checkbox w-4 h-4">
                            <span class="font-medium">Asia</span>
                            <span class="ml-auto text-sm font-semibold text-gray-400 region-count">0</span>
                        </li>
                        <li data-region="europe" class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" class="accent-sky-600 region-checkbox w-4 h-4">
                            <span class="font-medium">Europe</span>
                            <span class="ml-auto text-sm font-semibold text-gray-400 region-count">0</span>
                        </li>
                        <li data-region="oceania" class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" class="accent-sky-600 region-checkbox w-4 h-4">
                            <span class="font-medium">Oceania</span>
                            <span class="ml-auto text-sm font-semibold text-gray-400 region-count">0</span>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>

        <div id="overlay" class="fixed inset-0 bg-black/50 z-[55] hidden"></div>

        <main class="flex-1 min-w-0">
            <header class="sticky top-0 z-50 flex items-center justify-between p-4 bg-[#003049] shadow-md gap-3">
                
                <div class="flex items-center gap-3">
                    <button id="mobile-menu-btn" class="md:hidden text-white text-xl">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 class="text-xl md:text-2xl font-bold text-white">Terminal</h2>
                </div>

                <div class="relative flex-1 max-w-md">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="search-input" placeholder="Search..."
                        class="w-full bg-gray-100 border-none rounded-3xl py-1.5 pl-9 pr-4 text-sm focus:ring-2 focus:ring-yellow-500 outline-none">
                </div>

                <div class="flex items-center gap-3 text-xs font-bold text-white">
                    <span class="hidden sm:inline uppercase">Showing <span id="showing-count">0</span></span>
                    <div class="flex border border-gray-500 rounded overflow-hidden shrink-0">
                        <button class="bg-black text-white p-2"><i class="fas fa-th-large"></i></button>
                        <a href="detail.html" class="bg-white text-black p-2 border-l border-gray-500">
                            <i class="fas fa-bars"></i>
                        </a>
                    </div>
                </div>
            </header>

            <div id="countries-grid" class="p-4 md:p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 bg-[#fdf0d5] min-h-screen">
            </div>

            <div id="loader" class="hidden fixed inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm z-[100]">
                <div class="flex items-center gap-3 bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-xl font-semibold">
                    <svg class="w-5 h-5 animate-spin" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
                    <span>Updating...</span>
                </div>
            </div>
        </main>
    </div>

    <script src="region.js"></script>
</body>
</html>
